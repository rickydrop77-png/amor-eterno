<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Eterna Namorada ❤️</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#ff4d6d,#ff758f,#ffc2d1);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .recipiente{
            max-width:900px;
            width:90%;
            text-align:center;
            padding:30px;
            background:rgba(255,255,255,0.25);
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
        }
        .recipiente img{
            max-width:300px;
            width:80%;
            border-radius:20px;
            margin:20px 0;
        }
        h1{
            font-size:2.5em;
            color:white;
            margin-bottom:10px;
        }
        p{
            font-size:1.2em;
            color:white;
            margin-bottom:20px;
        }
        audio{
            width:100%;
            outline:none;
            margin-top:20px;
        }
        /* coração animado */
        .coração{
            position: absolute;
            font-size:24px;
            animation: flutuar 5s infinite;
        }
        @keyframes flutuar{
            0%{transform:translateY(0);}
            50%{transform:translateY(-20px);}
            100%{transform:translateY(0);}
        }
    </style>
</head>
<body>
    <div class="recipiente">
        <h1>❤️ Feliz Dia dos Namorados ❤️</h1>
        <p>Para Minha Eterna Namorada 💕</p>
        <img src="c.gu-128.jpg" alt="Nossa Foto">
        <p>Você é o melhor presente que a vida me deu. ❤️ Cada momento ao seu lado se torna especial e inesquecível. Obrigado por fazer parte da minha história. Te amo hoje, amanhã e para sempre. ❤️</p>
        <audio controls autoplay>
            <source src="Ruth B. - Dentes-de-leão (Áudio).mp3" type="audio/mpeg">
            Seu navegador não suporta o elemento de áudio.
        </audio>
    </div>
</body>
</html>
