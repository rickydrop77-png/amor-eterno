<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Minha Eterna Namorada ❤️</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#ff4d6d,#ff758f,#ffc2d1);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .recipiente{
      max-width:900px;
      width:90%;
      text-align:center;
      padding:30px;
      background: rgba(255,255,255,0.2);
      border-radius:20px;
      backdrop-filter: blur(10px);
    }
    h1{
      font-size:2.5em;
      color:white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      margin-bottom:10px;
    }
    p{
      color:white;
      font-size:1.2em;
      margin-bottom:20px;
    }
    img{
      max-width:300px;
      width:80%;
      border-radius:15px;
      margin-bottom:20px;
    }
    audio{
      width:80%;
      outline:none;
    }
    /* corações animados */
    .coracao{
      position:absolute;
      font-size:24px;
      animation: float 5s linear infinite;
    }
    @keyframes float{
      0%{transform: translateY(0) translateX(0);}
      50%{transform: translateY(-50px) translateX(20px);}
      100%{transform: translateY(-100px) translateX(0);}
    }
  </style>
</head>
<body>
  <div class="recipiente">
    <h1>❤️ Feliz Dia dos Namorados ❤️</h1>
    <p>Para Minha Eterna Namorada 💖</p>
    <img src="c.gu-128.jpg" alt="Nossa Foto">
    <p>Você é o melhor presente que a vida me deu. ❤️ Cada momento ao seu lado se torna especial e inesquecível. Obrigado por fazer parte da minha história. Te amo hoje, amanhã e para sempre. ❤️</p>
    <audio controls>
      <source src="Ruth B. - Dandelions (Audio).mp3" type="audio/mpeg">
      Seu navegador não suporta áudio.
    </audio>
  </div>

  <!-- corações animados -->
  <div class="coracao" style="left:10%;top:80%;">❤️</div>
  <div class="coracao" style="left:30%;top:90%;">❤️</div>
  <div class="coracao" style="left:50%;top:85%;">❤️</div>
  <div class="coracao" style="left:70%;top:95%;">❤️</div>
  <div class="coracao" style="left:90%;top:80%;">❤️</div>
</body>
</html>
