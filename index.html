<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Minha Eterna Namorada ❤️</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff4d6d,#ff758f,#ffc2d1);
  overflow:hidden;
}
.recipiente {
  max-width:900px;
  width:90%;
  text-align:center;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.3);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  position: relative;
  z-index: 1;
}
.recipiente h1 { font-size:2.5em; color:white; text-shadow:2px 2px 5px #000; margin-bottom:15px; }
.recipiente p { color:white; font-size:1.2em; margin-bottom:20px; }
.recipiente img { max-width:250px; border-radius:10px; margin-bottom:20px; }
audio { width:100%; outline:none; }

/* corações flutuando */
.heart {
  position: absolute;
  font-size: 30px;
  color: red;
  animation: float 6s linear infinite;
  z-index: 0;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0.5); opacity:0.7; }
  100% { transform: translateY(-10vh) scale(1); opacity:1; }
}
</style>
</head>
<body>
<div class="recipiente">
  <h1>❤️ Feliz Dia dos Namorados ❤️</h1>
  <p>Para Minha Eterna Namorada ❤️</p>
  <img src="c.gu-128.jpg" alt="Nossa Foto">
  <p>Você é o melhor presente que a vida me deu. ❤️ Cada momento ao seu lado se torna especial e inesquecível. Obrigado por fazer parte da minha história. Te amo hoje, amanhã e para sempre. ❤️</p>
  <audio controls autoplay>
    <source src="Ruth B. - Dentes-de-lão (Áudio).mp3" type="audio/mpeg">
    Seu navegador não suporta o elemento de áudio.
  </audio>
</div>

<script>
// gerar corações aleatórios
const numHearts = 30;
for(let i=0;i<numHearts;i++){
  let heart = document.createElement('div');
  heart.classList.add('heart');
  heart.style.left = Math.random()*100 + 'vw';
  heart.style.animationDuration = (4+Math.random()*4) + 's';
  heart.style.fontSize = (20+Math.random()*20) + 'px';
  heart.innerHTML = '❤️';
  document.body.appendChild(heart);
}
</script>
</body>
</html>
